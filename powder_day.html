<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powder Production Day</title>
    <link rel="stylesheet" type="text/css" href="style_tank.css">
</head>

<body>
    <div id="container">
        <div id="header">
            <div>
                <img id="logo" src="Arka ganga PNG.png" alt="Arka Ganga">
            </div>

            <div id="bi">
                BALAJI INDUSTRIES
            </div>

        </div>

        <hr>
    <form id="form" action="" name="Production Sheet" method="post">

            <option value="White">White</option>
            <option value="Black">Black</option>
            <option value="B/T">B/T</option>
            <option value="Firozi">Firozi</option>
            <option value="New Color">New Color</option>
        </select>

        <label for="pcode">Qty</label>
        <input type="text" id="qty" name="day_dana-bags1" placeholder="in Bags">
        <input type="text" id="qty" name="day_dana-kgs1" placeholder="in Kgs">
        <br>

        <label for="rno">Color</label>
        <select id="dropdown" name="day_dana2">

            <option value="White">White</option>
            <option value="Black">Black</option>
            <option value="B/T">B/T</option>
            <option value="Firozi">Firozi</option>
            <option value="New Color">New Color</option>
        </select>

        <label for="pcode">Qty</label>
        <input type="text" id="qty" name="day_dana-bags3" placeholder="in Bags">
        <input type="text" id="qty" name="day_dana-kgs3" placeholder="in Kgs">
        <br>




        <label id="heading">
            Pulverizer
        </label>
        <br>

        <label for="rno">Color</label>
        <select id="dropdown" name="day_powder1">
            <option value="" selected></option>
            <option value="Yellow">Yellow</option>
            <option value="White">White</option>
            <option value="Black">Black</option>
            <option value="B/T">B/T</option>
            <option value="Firozi">Firozi</option>
            <option value="Virgin">Virgin</option>
            <option value="New Color">New Color</option>
        </select>

        <label for="pcode">Qty</label>
        <input type="text" id="qty" name="day_powder-bags1" placeholder="in Bags">
        <input type="text" id="qty" name="day_powder-kgs1" placeholder="in Kgs">
        <br>

        <label for="rno">Color</label>
        <select id="dropdown" name="day_powder2">
            <option value="" selected></option>
            <option value="Yellow">Yellow</option>
            <option value="White">White</option>

            <option value="B/T">B/T</option>

        <label for="pcode">Qty</label>
        <input type="text" id="qty" name="day_powder-bags3" placeholder="in Bags">
        <input type="text" id="qty" name="day_powder-kgs3" placeholder="in Kgs">
        <br>

        <input id="submit" type="submit" value="Submit">
    </form>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxFx5ONQCMY0xxgYcn0_OtTWG-FnrPauMdGQOUAaEaKg2jPmIT650aU80pORy697gKu/exec'
        const form = document.forms['Production Sheet']

        form.addEventListener('submit', e => {
            e.preventDefault()
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => alert("Thank you! your form is submitted successfully."))
                .then(() => { window.location.reload(); })
                .catch(error => console.error('Error!', error.message))
        })
    </script>
</body>

</html>
